name: flutter_bloc_template
description: A reusable Flutter template using flutter_bloc, layered architecture, and secure abstractions.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^8.2.0
  go_router: ^16.2.1
  meta: ^1.17.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  kflavor: ^1.1.4

flutter:
  uses-material-design: true
